<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MetaMind｜探索中心</title>
<link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
<div class="page">
<header class="hero">
<div class="brand">MetaMind</div>
<div class="subtitle">探索中心</div>
</header>
<main class="card">
<div id="profileLine" class="profile-line">載入中...</div>
<div id="quickReading" class="quick-reading">師傅看盤中…</div>

<div class="ask-box">
<textarea id="question" class="question-input" placeholder="輸入你的問題..."></textarea>
<button id="askBtn" class="btn">問師傅</button>
</div>

<div id="answer" class="answer"></div>
<button id="shareAnswerBtn" class="share-btn" style="display:none;">📤 分享</button>

<div class="features">
<div id="featureGrid" class="feature-grid"></div>
</div>
</main>

<!-- 歷史紀錄區塊 -->
<section class="qa-history" id="qaHistory">
<div class="qa-history-head">
<h2 class="qa-history-title">我的問答</h2>
<button id="qaHistoryClear" class="qa-history-clear" type="button">清空</button>
</div>
<div id="qaHistoryEmpty" class="qa-empty">目前還沒有紀錄。你問一次，這裡就會自動保存 🙂</div>
<div id="qaHistoryList" class="qa-list"></div>
</section>

<button id="openSafariBtn" class="btn btn-ghost" style="display:none;">🌐 用 Safari 開啟</button>
<div class="footerline"><a href="./index.html" style="color:#999;text-decoration:none;">← 重新輸入資料</a></div>
</div>
<script src="./assets/app.js"></script>
</body>
</html>
