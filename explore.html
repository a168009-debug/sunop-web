<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MetaMind｜探索中心</title>
<link rel="stylesheet" href="/assets/style.css?v=20260224" />
</head>
<body>
<div class="page">
<header class="hero">
<div class="brand">MetaMind</div>
<div class="subtitle">探索中心</div>
</header>
<main class="card">
<div id="profileLine" class="profile-line">載入中...</div>
<div id="quickReading" class="quick-reading">師傅看盤中…</div>

<div class="ask-box">
<textarea id="question" class="question-input" placeholder="輸入你的問題..."></textarea>
<button id="askBtn" class="btn">問師傅</button>
</div>

<div id="answer" class="answer"></div>

<!-- Share row -->
<div class="share-row">
<button id="shareBtn" class="btn-share" type="button" aria-label="分享">
<span class="share-icon" aria-hidden="true">⤴︎</span>
<span>分享</span>
</button>
</div>
<!-- Toast -->
<div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<div class="features">
<div id="featureGrid" class="feature-grid"></div>
</div>
</main>

<!-- 歷史紀錄區塊 -->
<section class="qa-history" id="qaHistory">
<div class="qa-history-head">
<h2 class="qa-history-title">我的問答</h2>
<button id="qaHistoryClear" class="qa-history-clear" type="button">清空</button>
</div>
<div id="qaHistoryEmpty" class="qa-empty">目前還沒有紀錄。你問一次，這裡就會自動保存 🙂</div>
<div id="qaHistoryList" class="qa-list"></div>
</section>

<!-- Debug Report -->
<button id="debugBtn" class="btn-debug" type="button">回報除錯資訊</button>
<pre id="debugOutput" class="debug-output"></pre>

<button id="openSafariBtn" class="btn btn-ghost" style="display:none;">🌐 用 Safari 開啟</button>
<div class="footerline"><a href="/index.html?v=20260224" style="color:#999;text-decoration:none;">← 重新輸入資料</a></div>
</div>
<script defer src="/assets/app.js?v=20260224"></script>
</body>
</html>
