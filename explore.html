<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MetaMind｜探索中心</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{ --gold:#d6b15e; --gold2:#b8923a; --bg1:#050404; --bg2:#120c07; --text:#f7f3e8; --card:rgba(255,255,255,.06); --stroke:rgba(214,177,94,.25); --muted:rgba(247,243,232,.75); }
*{box-sizing:border-box}
body{margin:0;font-family:"Noto Serif TC",serif;color:var(--text);background:linear-gradient(180deg,var(--bg1),var(--bg2));}
.wrap{max-width:860px;margin:0 auto;padding:26px 16px 44px;}
.title{font-size:42px;letter-spacing:4px;text-align:center;color:var(--gold);margin:6px 0 6px;}
.subtitle{opacity:.85;text-align:center;margin:0 0 18px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px;}
.card{ border:1px solid var(--stroke); background:var(--card); border-radius:18px; padding:18px; min-height:106px; display:flex; flex-direction:column; justify-content:center; align-items:center; box-shadow:0 10px 40px rgba(0,0,0,.35); cursor:pointer; user-select:none; transition:transform .15s ease; }
.card:hover{transform:translateY(-2px)}
.card .icon{font-size:26px; margin-bottom:10px; opacity:.95}
.card .label{letter-spacing:2px}
.panel{ border:1px solid var(--stroke); background:var(--card); border-radius:18px; padding:16px; margin-top:16px; box-shadow:0 10px 40px rgba(0,0,0,.35); }
.panel h3{margin:0 0 8px;color:var(--gold);letter-spacing:3px}
.panel ul{margin:8px 0 0 18px; padding:0; color:var(--muted); line-height:1.8}
.btnHome{ width:100%; margin-top:14px; padding:14px 12px; border-radius:14px; border:none; cursor:pointer; background:linear-gradient(180deg,var(--gold),var(--gold2)); color:#1b1207; font-weight:900; letter-spacing:3px; }
.aiFab{ position:fixed; right:18px; bottom:24px; width:84px; height:84px; border-radius:999px; border:2px solid rgba(214,177,94,.55); background:radial-gradient(circle at 30% 30%, rgba(214,177,94,.28), rgba(0,0,0,.35)); display:flex; align-items:center; justify-content:center; box-shadow:0 16px 50px rgba(0,0,0,.45); cursor:pointer; user-select:none; }
.aiFab span{color:var(--gold);font-weight:900;letter-spacing:2px}
.toast{margin-top:10px; text-align:center; color:rgba(247,243,232,.78); min-height:22px}
/* Modal */
.modalMask{ position:fixed; inset:0; background:rgba(0,0,0,.62); display:none; align-items:center; justify-content:center; padding:18px; }
.modal{ width:min(720px,100%); border-radius:18px; border:1px solid var(--stroke); background:linear-gradient(180deg, rgba(20,12,7,.95), rgba(10,6,4,.92)); box-shadow:0 24px 80px rgba(0,0,0,.65); overflow:hidden; }
.modalHead{ display:flex; align-items:center; justify-content:space-between; padding:14px 14px 10px; border-bottom:1px solid rgba(214,177,94,.18); }
.modalTitle{display:flex; gap:10px; align-items:center; color:var(--gold); letter-spacing:2px}
.closeBtn{ width:38px; height:38px; border-radius:12px; border:1px solid rgba(214,177,94,.28); background:rgba(255,255,255,.06); color:var(--text); cursor:pointer; }
.chat{ padding:12px 14px; height:44vh; overflow:auto; }
.msg{display:flex; margin:10px 0;}
.msg.ai{justify-content:flex-start}
.msg.user{justify-content:flex-end}
.bubble{ max-width:88%; padding:12px 12px; border-radius:14px; line-height:1.7; white-space:pre-wrap; border:1px solid rgba(214,177,94,.18); }
.ai .bubble{background:rgba(255,255,255,.06); color:var(--text)}
.user .bubble{background:rgba(214,177,94,.14); color:var(--text)}
.modalFoot{ display:flex; gap:10px; padding:12px 14px 14px; border-top:1px solid rgba(214,177,94,.18); align-items:center; }
.modeSel{ border-radius:12px; padding:10px 10px; border:1px solid rgba(214,177,94,.25); background:rgba(0,0,0,.25); color:var(--text); font-family:"Noto Serif TC",serif; }
.input{ flex:1; border-radius:12px; padding:12px 12px; border:1px solid rgba(214,177,94,.25); background:rgba(0,0,0,.25); color:var(--text); outline:none; font-family:"Noto Serif TC",serif; }
.sendBtn{ padding:12px 14px; border-radius:12px; border:none; cursor:pointer; background:linear-gradient(180deg,var(--gold),var(--gold2)); color:#1b1207; font-weight:900; letter-spacing:2px; }
@media (max-width:720px){ .grid{grid-template-columns:repeat(2,1fr)} .title{font-size:36px} .aiFab{width:78px;height:78px} }
</style>
</head>
<body>
<div class="wrap">
<div class="title">探索中心</div>
<div class="subtitle" id="welcomeName">歡迎・朋友</div>
<div class="toast" id="welcomeMessage"></div>
<div class="grid">
<div class="card" onclick="featureComingSoon('八字命盤')"> <div class="icon">📜</div><div class="label">八字命盤</div> </div>
<div class="card" onclick="featureComingSoon('姓名分析')"> <div class="icon">✍️</div><div class="label">姓名分析</div> </div>
<div class="card" onclick="featureComingSoon('情緒曲線')"> <div class="icon">📊</div><div class="label">情緒曲線</div> </div>
<div class="card" onclick="featureComingSoon('AI畫像')"> <div class="icon">🎨</div><div class="label">AI畫像</div> </div>
<div class="card" onclick="featureComingSoon('智慧卡')"> <div class="icon">🃏</div><div class="label">智慧卡</div> </div>
<div class="card" onclick="featureComingSoon('測字')"> <div class="icon">🖋️</div><div class="label">測字</div> </div>
</div>
<div class="panel">
<h3>今日指引</h3>
<ul>
<li>點擊任一功能了解自己</li>
<li>有問題可以問 AI 助理（已自動讀取你剛剛輸入的資料）</li>
</ul>
<button class="btnHome" onclick="goHome()">回首頁</button>
</div>
</div>
<div class="aiFab" onclick="openAI()"><span>問AI</span></div>
<!-- AI Modal -->
<div class="modalMask" id="modalMask" onclick="maskClose(event)">
<div class="modal" onclick="event.stopPropagation()">
<div class="modalHead">
<div class="modalTitle"> <span>💬</span> <span>AI 命理顧問</span> </div>
<button class="closeBtn" onclick="closeAI()">×</button>
</div>
<div class="chat" id="chat"></div>
<div class="modalFoot">
<select class="modeSel" id="modeSel">
<option value="quick">Quick（快問快答）</option>
<option value="deep">Deep（深度解盤）</option>
</select>
<input class="input" id="chatInput" placeholder="想問就問：感情/財運/健康/工作/近三個月走勢…" />
<button class="sendBtn" onclick="sendChat()">送出</button>
</div>
</div>
</div>
<script>
const LS_KEY = "metamind_profile";
function goHome(){ window.location.href = "index.html"; }
function featureComingSoon(name){ alert(name + "：功能正在上線中，先用『問AI』可直接解答。"); }
function getProfile(){ try{ return JSON.parse(localStorage.getItem(LS_KEY) || "null"); } catch(e){ return null; } }
function setWelcome(profile){ const name = (profile && profile.name) ? profile.name : "朋友"; document.getElementById("welcomeName").innerText = "歡迎・" + name; }
async function fetchIntro(profile){
const el = document.getElementById("welcomeMessage");
el.innerText = "正在讀盤…";
if(!profile || !profile.name || !profile.year || !profile.month || !profile.day || !profile.hourBranch){
el.innerText = "錯誤：找不到你的出生資料，請回首頁重新輸入。";
return;
}
try{
const r = await fetch("/.netlify/functions/bazi_ai",{ method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ ...profile, mode: "quick", question: "__INTRO__" }) });
const data = await r.json();
if(!r.ok){ el.innerText = "錯誤：請稍後再試"; return; }
el.innerText = data?.reply?.opening || data?.opening || "已讀取命盤。你可以直接點右下角問 AI。";
}catch(e){ el.innerText = "連線不穩：先點右下角問 AI（系統會自動帶入你的資料）。"; }
}
function openAI(){
const mask = document.getElementById("modalMask");
mask.style.display = "flex";
document.getElementById("chatInput").focus();
const profile = getProfile();
const name = (profile && profile.name) ? profile.name : "朋友";
if(document.getElementById("chat").children.length === 0){
pushAI("你好，" + name + "。我已讀取你剛剛輸入的出生資料。想問哪一塊？我可以先從你最近『心緒/睡眠/身體火氣』或『工作壓力/財務節奏』切入。");
}
}
function closeAI(){ document.getElementById("modalMask").style.display = "none"; }
function maskClose(e){ if(e.target.id === "modalMask") closeAI(); }
function pushAI(text){
const chat = document.getElementById("chat");
const row = document.createElement("div");
row.className = "msg ai";
const b = document.createElement("div");
b.className = "bubble";
b.textContent = text;
row.appendChild(b);
chat.appendChild(row);
chat.scrollTop = chat.scrollHeight;
}
function pushUser(text){
const chat = document.getElementById("chat");
const row = document.createElement("div");
row.className = "msg user";
const b = document.createElement("div");
b.className = "bubble";
b.textContent = text;
row.appendChild(b);
chat.appendChild(row);
chat.scrollTop = chat.scrollHeight;
}
async function sendChat(){
const input = document.getElementById("chatInput");
const q = (input.value || "").trim();
if(!q) return;
const mode = document.getElementById("modeSel").value || "quick";
const profile = getProfile();
pushUser(q);
input.value = "";
if(!profile || !profile.name){
pushAI("我這邊沒讀到你的資料，請回首頁重新輸入一次（姓名/年月日/時辰）。");
return;
}
pushAI("我看一下…");
try{
const r = await fetch("/.netlify/functions/bazi_ai",{ method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ ...profile, mode, question: q }) });
const data = await r.json();
const last = document.getElementById("chat").lastChild;
if(last && last.className.includes("ai")){
last.querySelector(".bubble").textContent = (data?.reply?.text || data?.text || "我剛剛的推演被打斷了，你再送一次，我會用更短的版本回你。");
}
}catch(e){
const last = document.getElementById("chat").lastChild;
if(last && last.className.includes("ai")){
last.querySelector(".bubble").textContent = "連線不穩或超時。我先給你一句短判：『這題你要的是結論，不是過程。』你再補一句：你最在意的是感情、錢、還是身體？我會直接切中。";
}
}
}
window.addEventListener("DOMContentLoaded", async () => {
const p = getProfile();
setWelcome(p);
await fetchIntro(p);
});
</script>
</body>
</html>
