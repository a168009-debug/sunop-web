<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>探索中心 - MetaMind</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--gold:#d6b15e;--bg1:#050404;--bg2:#120c07;--text:#fff}
*{box-sizing:border-box}body{margin:0;font-family:"Noto Serif TC",serif;color:var(--text);background:linear-gradient(180deg,var(--bg1),var(--bg2));min-height:100vh;padding-bottom:80px}
.wrap{max-width:480px;margin:0 auto;padding:20px}
.title{font-size:24px;text-align:center;color:var(--gold);margin-bottom:15px}
.subtitle{font-size:16px;text-align:center;color:var(--gold);margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.card{background:rgba(255,255,255,.05);border:1px solid #333;border-radius:10px;padding:15px;text-align:center;cursor:pointer}
.card:hover{border-color:var(--gold)}
.card-icon{font-size:24px;margin-bottom:5px}
.card-title{font-size:12px;color:#aaa}
.btn{width:100%;padding:12px;background:var(--gold);border:none;border-radius:8px;color:#000;font-weight:bold;cursor:pointer;margin-top:10px}
.btn-back{background:#333;color:#fff}
.ask-ai{position:fixed;right:20px;bottom:90px;width:60px;height:60px;border-radius:50%;background:var(--gold);border:none;color:#000;font-weight:bold;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:100}
.ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:200}
.ai-overlay.open{display:flex}
.ai-box{width:90%;max-width:400px;background:#1a1a1a;border:1px solid var(--gold);border-radius:12px;padding:15px;max-height:80vh;display:flex;flex-direction:column}
.ai-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ai-title{color:var(--gold);font-weight:bold}
.ai-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.ai-msgs{flex:1;overflow-y:auto;min-height:200px;margin-bottom:10px}
.ai-msg{padding:8px 12px;border-radius:8px;margin-bottom:8px;max-width:85%}
.ai-msg.ai{background:rgba(214,177,94,.2);align-self:flex-start}
.ai-msg.user{background:rgba(214,177,94,.4);align-self:flex-end;margin-left:auto}
.ai-input{width:100%;padding:10px;background:#333;border:1px solid #444;border-radius:8px;color:#fff}
.page{display:none}
.page.active{display:block}
.result-box{background:rgba(255,255,255,.05);border:1px solid #333;border-radius:10px;padding:15px;margin-bottom:15px}
.result-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #333}
.result-label{color:#888}
.result-value{color:var(--gold);font-weight:bold}
.health-tip{background:rgba(214,177,94,.1);border-left:3px solid var(--gold);padding:10px;margin-top:10px;font-size:13px}
.ai-section{background:rgba(214,177,94,.1);border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:10px}
.ai-section h4{color:var(--gold);margin:0 0 8px;font-size:14px}
.ai-section ul{margin:0;padding-left:18px;font-size:13px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chip{background:rgba(214,177,94,.2);border:1px solid var(--gold);color:var(--gold);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer}
.loading{text-align:center;color:var(--gold);padding:20px}
</style>
</head>
<body>
<button class="ask-ai" id="askAiBtn" onclick="openAI()">問AI</button>

<div class="wrap">
<div class="title">探索中心</div>
<div class="subtitle" id="welcomeName">朋友的專屬分析</div>
<div id="aiIntro"></div>

<div class="grid">
<div class="card" onclick="showPage('bazi')"><div class="card-icon">📜</div><div class="card-title">八字命盤</div></div>
<div class="card" onclick="showPage('name')"><div class="card-icon">✍️</div><div class="card-title">姓名分析</div></div>
<div class="card" onclick="showPage('mood')"><div class="card-icon">📊</div><div class="card-title">情緒曲線</div></div>
<div class="card" onclick="showPage('art')"><div class="card-icon">🎨</div><div class="card-title">AI畫像</div></div>
<div class="card" onclick="showPage('card')"><div class="card-icon">🃏</div><div class="card-title">智慧卡</div></div>
<div class="card" onclick="showPage('zi')"><div class="card-icon">🖋️</div><div class="card-title">測字</div></div>
</div>

<button class="btn btn-back" onclick="goHome()">回首頁</button>
</div>

<!-- 八字頁 -->
<div id="baziPage" class="page">
<div class="wrap">
<div class="title">八字命盤</div>
<div id="baziResult"></div>
<button class="btn btn-back" onclick="showPage('')">返回</button>
</div>
</div>

<!-- 姓名頁 -->
<div id="namePage" class="page">
<div class="wrap">
<div class="title">姓名分析</div>
<div id="nameResult"></div>
<button class="btn btn-back" onclick="showPage('')">返回</button>
</div>
</div>

<!-- AI 對話框 -->
<div class="ai-overlay" id="aiOverlay" onclick="closeAI(event)">
<div class="ai-box" onclick="event.stopPropagation()">
<div class="ai-header">
<span class="ai-title">💬 AI 命理顧問</span>
<button class="ai-close" onclick="closeAI()">✕</button>
</div>
<div class="ai-msgs" id="aiMsgs"></div>
<input class="ai-input" id="aiInput" placeholder="問 AI 任何問題…" onkeydown="if(event.key==='Enter')sendAI()">
</div>
</div>
</div>

<script>
var profile = null;
var chatHistory = [];

function loadProfile(){
  try{ return JSON.parse(localStorage.getItem('metamind_profile')); }catch(e){ return null; }
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  if(id){
    document.getElementById(id+'Page').classList.add('active');
    if(id==='bazi') calculateBazi();
    if(id==='name') analyzeName();
  }
}

function goHome(){ window.location.href='index.html'; }

window.addEventListener('DOMContentLoaded',function(){
  profile = loadProfile();
  if(!profile || !profile.name){ window.location.href='index.html'; return; }
  document.getElementById('welcomeName').textContent = profile.name + '的專屬分析';
  bootQuickOpening();
});

async function bootQuickOpening(){
  var el = document.getElementById('aiIntro');
  el.innerHTML = '<div class="loading">✨ AI 正在分析中...</div>';
  try{
    var res = await fetch('/.netlify/functions/bazi_ai',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mode:'quick',name:profile.name,year:profile.year,month:profile.month,day:profile.day,hourBranch:profile.hourBranch})
    });
    var data = await res.json();
    if(!data.ok){ el.innerHTML='<div class="ai-section"><p>請稍後再試</p></div>'; return; }
    var r = data.result || {};
    var html = '';
    if(r.opening) html += '<div class="ai-section"><h4>🔮 '+r.opening+'</h4></div>';
    if(r.highlights){
      html += '<div class="ai-section"><h4>今日關鍵</h4><ul>';
      r.highlights.forEach(h=>html+='<li>'+h+'</li>');
      html += '</ul></div>';
    }
    if(r.risk_flags){
      html += '<div class="ai-section" style="border-color:#f55"><h4>⚠ 注意</h4><ul>';
      r.risk_flags.forEach(f=>html+='<li>'+f+'</li>');
      html += '</ul></div>';
    }
    if(r.suggested_questions){
      html += '<div class="chips">';
      r.suggested_questions.forEach(q=>html+='<span class="chip" onclick="openAI(\''+q+'\')">'+q+'</span>');
      html += '</div>';
    }
    el.innerHTML = html;
  }catch(e){ el.innerHTML = '<div class="ai-section"><p>請稍後再試</p></div>'; }
}

function openAI(question){
  document.getElementById('aiOverlay').classList.add('open');
  var msgs = document.getElementById('aiMsgs');
  if(!msgs.innerHTML){
    var p = profile;
    addMsg('已讀取：'+p.name+'｜'+p.year+'/'+p.month+'/'+p.day+'｜'+p.hourBranch);
  }
  if(question){
    document.getElementById('aiInput').value = question;
    sendAI();
  }
}

function closeAI(e){ if(e && e.target!==e.currentTarget)return; document.getElementById('aiOverlay').classList.remove('open'); }
function addMsg(text,isUser){
  var msgs = document.getElementById('aiMsgs');
  var div = document.createElement('div');
  div.className = 'ai-msg '+(isUser?'user':'ai');
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendAI(){
  var input = document.getElementById('aiInput');
  var text = input.value.trim();
  if(!text) return;
  addMsg(text,true);
  input.value = '';
  addMsg('...','ai');
  
  try{
    var res = await fetch('/.netlify/functions/bazi_ai',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mode:'deep',name:profile.name,year:profile.year,month:profile.month,day:profile.day,hourBranch:profile.hourBranch,question:text}),
      signal:AbortSignal.timeout(25000)
    });
    var data = await res.json();
    var msgs = document.getElementById('aiMsgs');
    msgs.lastChild.remove();
    
    if(data.fallback){
      addMsg(data.summary+' '+data.suggestions.join(' '));
    }else if(data.result){
      var r = data.result;
      var reply = '';
      if(r.sections) r.sections.forEach(s=>reply+=s.summary+' ');
      if(r.action_plan) reply += '\n建議：'+r.action_plan.join(' ');
      addMsg(reply);
    }else{
      addMsg(data.result || data.error || '請稍後再試');
    }
  }catch(e){
    var msgs = document.getElementById('aiMsgs');
    if(msgs.lastChild)msgs.lastChild.textContent = '錯誤：'+e.message;
  }
}

function calculateBazi(){
  var y=profile.year,m=profile.month,d=profile.day,h=profile.hourBranch;
  var 天干=["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
  var 地支=["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
  var 地支五行={"子":"水","亥":"水","寅":"木","卯":"木","巳":"火","午":"火","申":"金","酉":"金","丑":"土","辰":"土","未":"土","戌":"土"};
  var 五行健康={"火":"脾氣火爆","水":"容易焦慮","木":"肝火旺盛","金":"呼吸系統弱","土":"消化系統弱"};
  
  var 年柱=天干[(y-4)%10]+地支[(y-4)%12];
  var 起始=[2,4,6,8,0][Math.floor(天干.indexOf(年柱[0])/2)];
  var 月柱=天干[(起始+m-1)%10]+["寅","卯","辰","巳","午","未","申","酉","戌","亥","子","丑"][m-1];
  var 基準日=new Date(1900,2,1);
  var 天數差=Math.floor((new Date(y,m-1,d)-基準日)/(1000*60*60*24));
  var 日柱=天干[(天數差%10+10)%10]+地支[(天數差%12+12)%12];
  var 日干索引=天干.indexOf(日柱[0]);
  var 時柱=天干[([0,2,4,6,8][Math.floor(日干索引/2)]||0)+地支.indexOf(h)%10]+h;
  var 日五行=地支五行[日柱[1]];
  
  document.getElementById('baziResult').innerHTML='<div class="result-box"><div class="result-row"><span class="result-label">年柱</span><span class="result-value">'+年柱+'</span></div><div class="result-row"><span class="result-label">月柱</span><span class="result-value">'+月柱+'</span></div><div class="result-row"><span class="result-label">日柱</span><span class="result-value">'+日柱+'</span></div><div class="result-row"><span class="result-label">時柱</span><span class="result-value">'+時柱+'</span></div></div><div class="health-tip"><strong>望診提醒：</strong>'+五行健康[日五行]+'</div>';
}

function analyzeName(){
  var name = profile.name;
  var first = name.charAt(0);
  var strokes = (first.charCodeAt(0)%10)+1;
  var elements=['木','火','土','金','水'];
  var element = elements[strokes%5];
  document.getElementById('nameResult').innerHTML='<div class="result-box"><div class="result-row"><span class="result-label">姓名</span><span class="result-value">'+name+'</span></div><div class="result-row"><span class="result-label">首字</span><span class="result-value">'+first+'</span></div><div class="result-row"><span class="result-label">筆畫</span><span class="result-value">'+strokes+'畫</span></div><div class="result-row"><span class="result-label">五行</span><span class="result-value">'+element+'</span></div></div>';
}
</script>
</body>
</html>
