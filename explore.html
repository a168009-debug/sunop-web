<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MetaMind｜探索中心</title>
<!-- METAMIND_HTML_OK -->
<link rel="stylesheet" href="/assets/style.css?v=LUX_004" />
</head>
<body>
<main class="page">
<header class="hero">
<h1 class="brand">MetaMind</h1>
<p class="sub">探索中心</p>
</header>
<section class="card">
<div id="profileLine" class="profileLine">載入中...</div>
<div class="masterLineWrap">
<div class="masterLabel">師傅看盤中…</div>
<div id="masterLine" class="masterLine"></div>
</div>
<div class="qa">
<label class="field">
<span>問師傅</span>
<textarea id="question" rows="3" placeholder="你想問什麼？" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
</label>
<button id="askBtn" class="btn-primary" type="button">送出</button>
</div>
<div id="answerWrap" class="answerWrap">
<div id="answer" class="answer"></div>
<button id="shareBtn" class="btn-share" type="button">⤴ 分享</button>
</div>
<h3 class="sectionTitle">我的問答</h3>
<div id="history" class="history"></div>
<button id="clearHistoryBtn" class="btn-ghost" type="button">清空</button>
<div class="debugRow">
<button id="reportBtn" class="btn-link" type="button">回報除錯資訊</button>
<a class="btn-link" href="https://stunning-gecko-4a2c8b.netlify.app/" rel="noopener">← 重新輸入資料</a>
</div>
</section>
<div id="toast" class="toast">已複製到剪貼簿！</div>
<footer class="copyright">© MetaMind</footer>
</main>
<script src="/assets/app.js?v=LUX_004" defer></script>
</body>
</html>
