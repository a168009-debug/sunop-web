<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MetaMind｜探索中心</title>
<link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
<div class="page">
<header class="hero">
<div class="brand">MetaMind</div>
<div class="subtitle">探索中心</div>
</header>
<main class="card">
<h1 class="card-title">探索中心</h1>
<div id="profileLine" class="profileline">正在讀取命盤資料…</div>
<div class="section">
<div class="section-title">師傅先給你一句話</div>
<div id="quickReading" class="quickbox">（尚未生成）</div>
</div>
<div class="section">
<div class="section-title">功能</div>
<div class="grid2" id="featureGrid"></div>
</div>
<div class="section">
<div class="section-title">問 AI（像現場問師傅）</div>
<textarea id="question" class="textarea" placeholder="例如：我最近的阻力在哪？要怎麼破局？"></textarea>
<button id="askBtn" class="btn">送出</button>
<div id="answer" class="answer"></div>
<div class="minor-actions">
<button id="openSafariBtn" class="btn btn-ghost" type="button">用 Safari 開啟（避免白屏）</button>
<a class="link" href="./index.html">← 回首頁重新輸入</a>
</div>
</div>
</main>
</div>
<script src="./assets/app.js"></script>
</body>
</html>
