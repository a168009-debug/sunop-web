<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MetaMind｜探索中心</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
<main class="page">
<header class="top">
<div class="brand">MetaMind</div>
<div class="subtitle">探索中心</div>
</header>
<section class="card">
<h1 class="h1">探索中心</h1>
<p class="muted" id="welcome"></p>
<div class="divider"></div>
<div id="openingBox" class="opening">
<div class="skeleton" id="openingLoading"> 正在讀取命盤與推演中… </div>
<div id="openingText" class="openingText" hidden></div>
</div>
<div class="divider"></div>
<h2 class="h2">問 AI</h2>
<div class="qa">
<textarea id="question" rows="4" placeholder="例如：我最近的阻力在哪？要怎麼破局？"></textarea>
<button id="askBtn" class="btn">送出</button>
<p class="muted" id="qaMsg"></p>
<div id="answer" class="answer" hidden></div>
</div>
</section>
<footer class="foot">
<a class="link" href="./index.html">← 回首頁重新輸入</a>
</footer>
</main>
<script src="./app.js"></script>
</body>
</html>
