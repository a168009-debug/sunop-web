<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MetaMind｜輸入資料</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
<main class="page">
<header class="top">
<div class="brand">MetaMind</div>
<div class="subtitle">請輸入資料</div>
</header>
<section class="card">
<h1 class="h1">輸入您的資料</h1>
<form id="profileForm" class="form">
<label class="field">
<span>姓名</span>
<input id="name" type="text" placeholder="例如：莊曜瑋" autocomplete="name" required />
</label>
<div class="row">
<label class="field">
<span>西元年</span>
<input id="year" type="number" inputmode="numeric" placeholder="1987" min="1900" max="2100" required />
</label>
<label class="field">
<span>月份</span>
<input id="month" type="number" inputmode="numeric" placeholder="10" min="1" max="12" required />
</label>
<label class="field">
<span>日期</span>
<input id="day" type="number" inputmode="numeric" placeholder="14" min="1" max="31" required />
</label>
</div>
<label class="field">
<span>時辰</span>
<select id="shichen">
<option value="">不確定（可略過）</option>
<option value="子">子時（23:00–01:00）</option>
<option value="丑">丑時（01:00–03:00）</option>
<option value="寅">寅時（03:00–05:00）</option>
<option value="卯">卯時（05:00–07:00）</option>
<option value="辰">辰時（07:00–09:00）</option>
<option value="巳">巳時（09:00–11:00）</option>
<option value="午">午時（11:00–13:00）</option>
<option value="未">未時（13:00–15:00）</option>
<option value="申">申時（15:00–17:00）</option>
<option value="酉">酉時（17:00–19:00）</option>
<option value="戌">戌時（19:00–21:00）</option>
<option value="亥">亥時（21:00–23:00）</option>
</select>
<small class="hint">不知道出生時辰也可以先做「概略盤」分析。</small>
</label>
<button class="btn" type="submit">開始分析</button>
<p class="muted" id="msg"></p>
</form>
</section>
<footer class="foot">© MetaMind</footer>
</main>
<script src="./app.js"></script>
</body>
</html>
