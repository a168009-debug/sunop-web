<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MetaMind｜輸入資料</title>
<!-- METAMIND_HTML_OK -->
<link rel="stylesheet" href="/assets/style.css?v=LUX_004" />
</head>
<body>
<main class="page">
<header class="hero">
<h1 class="brand">MetaMind</h1>
<p class="sub">請輸入資料</p>
</header>
<section class="card">
<h2 class="cardTitle">輸入您的資料</h2>
<label class="field">
<span>姓名</span>
<input id="name" type="text" placeholder="例如：王小明" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
</label>
<div class="grid3">
<label class="field">
<span>西元年</span>
<input id="year" type="number" inputmode="numeric" placeholder="YYYY" autocomplete="off">
</label>
<label class="field">
<span>月份</span>
<input id="month" type="number" inputmode="numeric" placeholder="MM" autocomplete="off">
</label>
<label class="field">
<span>日期</span>
<input id="day" type="number" inputmode="numeric" placeholder="DD" autocomplete="off">
</label>
</div>
<label class="field">
<span>時辰</span>
<select id="hourBranch">
<option value="">不確定 / 未知（先做概略盤）</option>
<option value="子">子時（23:00–01:00）</option>
<option value="丑">丑時（01:00–03:00）</option>
<option value="寅">寅時（03:00–05:00）</option>
<option value="卯">卯時（05:00–07:00）</option>
<option value="辰">辰時（07:00–09:00）</option>
<option value="巳">巳時（09:00–11:00）</option>
<option value="午">午時（11:00–13:00）</option>
<option value="未">未時（13:00–15:00）</option>
<option value="申">申時（15:00–17:00）</option>
<option value="酉">酉時（17:00–19:00）</option>
<option value="戌">戌時（19:00–21:00）</option>
<option value="亥">亥時（21:00–23:00）</option>
</select>
</label>
<p class="hint">不知道出生時辰也可以先做「概略盤」分析；之後補時辰，結果會更精準。</p>
<div class="actions">
<button id="startBtn" class="btn-primary" type="button">開始分析</button>
<button id="clearBtn" class="btn-ghost" type="button">清除資料</button>
</div>
<p class="footnote">按下開始分析後，資料會先儲存在本機（localStorage），再進入探索中心。</p>
</section>
<footer class="copyright">© MetaMind</footer>
</main>
<script src="/assets/app.js?v=LUX_004" defer></script>
</body>
</html>
