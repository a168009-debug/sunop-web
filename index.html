<!doctype html>
<!-- METAMIND_HTML_OK -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MetaMind｜輸入資料</title>
<link rel="stylesheet" href="/assets/style.css?v=LUX_003" />
</head>
<body>
<div class="mm-bg"></div>
<main class="mm-shell">
<section class="mm-card mm-float">
<div class="page">
<header class="hero">
<div class="brand">MetaMind</div>
<div class="subtitle">請輸入資料</div>
</header>

<section id="dailyLuck" class="daily-luck" style="display:none;">
<div class="daily-header">
<span class="daily-title">今日運勢</span>
<span class="daily-time"></span>
</div>
<div class="luck-stars"></div>
<div class="luck-aspects"></div>
<div class="luck-tags"></div>
</section>

<main class="card">
<h1 class="card-title">輸入您的資料</h1>
<form id="baziForm" class="form" autocomplete="off">
<label class="label">姓名</label>
<input class="input" id="name" name="n" placeholder="例如：王小明" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
<div class="grid3">
<div>
<label class="label">西元年</label>
<input class="input" id="year" name="y" inputmode="numeric" placeholder="YYYY" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
</div>
<div>
<label class="label">月份</label>
<input class="input" id="month" name="m" inputmode="numeric" placeholder="MM" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
</div>
<div>
<label class="label">日期</label>
<input class="input" id="day" name="d" inputmode="numeric" placeholder="DD" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
</div>
</div>
<label class="label">時辰</label>
<select class="select" id="hourBranch" name="h" autocomplete="off">
<option value="">不確定 / 未知（先做概略盤）</option>
<option value="子">子時（23:00–01:00）</option>
<option value="丑">丑時（01:00–03:00）</option>
<option value="寅">寅時（03:00–05:00）</option>
<option value="卯">卯時（05:00–07:00）</option>
<option value="辰">辰時（07:00–09:00）</option>
<option value="巳">巳時（09:00–11:00）</option>
<option value="午">午時（11:00–13:00）</option>
<option value="未">未時（13:00–15:00）</option>
<option value="申">申時（15:00–17:00）</option>
<option value="酉">酉時（17:00–19:00）</option>
<option value="戌">戌時（19:00–21:00）</option>
<option value="亥">亥時（21:00–23:00）</option>
</select>
<div class="hint">不知道出生時辰也可以先做「概略盤」分析；之後補時辰，結果會更精準。</div>
<button class="btn" type="submit">開始分析</button>
<button type="button" class="btn btn-ghost" onclick="clearAll()">清除資料</button>
<div class="fineprint">按下開始分析後，資料會先儲存在本機（localStorage），再進入探索中心。</div>
</form>
<div class="footerline">© MetaMind</div>
</main>
</div>
<script>
localStorage.removeItem("metamind_profile");
localStorage.removeItem("baziData");
localStorage.removeItem("metamind_daily");
function clearAll(){
  localStorage.removeItem("metamind_profile");
  localStorage.removeItem("baziData");
  localStorage.removeItem("metamind_daily");
  document.getElementById("baziForm").reset();
  document.getElementById("dailyLuck").style.display = "none";
}
</script>
<script defer src="/assets/lunar.min.js?v=LUX_003"></script>
<script defer src="/assets/app.js?v=LUX_003"></script>
<script>
(function(){
  var t=setTimeout(function(){
    var before=getComputedStyle(document.body,"::before").content;
    if(!before||before==="none"||before==="\"\""){
      var warn=document.createElement("div");
      warn.style.cssText="position:fixed;left:12px;right:12px;bottom:12px;padding:12px 14px;background:#111;color:#fff;border-radius:12px;z-index:99999;font-size:14px;opacity:.95";
      warn.textContent="⚠️ CSS/JS 可能未載入（請檢查 /assets 路徑或 404）";
      document.body.appendChild(warn);
    }
  },1200);
  window.addEventListener("load",function(){clearTimeout(t)});
})();
</script>
</body>
</html>
