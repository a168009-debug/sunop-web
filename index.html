<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MetaMind｜輸入資料</title>
<link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
<div class="page">
<header class="hero">
<div class="brand">MetaMind</div>
<div class="subtitle">請輸入資料</div>
</header>
<main class="card">
<h1 class="card-title">輸入您的資料</h1>
<form id="baziForm" class="form">
<label class="label">姓名</label>
<input class="input" id="name" name="name" placeholder="例如：莊曜瑋" autocomplete="name" />
<div class="grid3">
<div>
<label class="label">西元年</label>
<input class="input" id="year" name="year" inputmode="numeric" placeholder="1987" />
</div>
<div>
<label class="label">月份</label>
<input class="input" id="month" name="month" inputmode="numeric" placeholder="10" />
</div>
<div>
<label class="label">日期</label>
<input class="input" id="day" name="day" inputmode="numeric" placeholder="14" />
</div>
</div>
<label class="label">時辰</label>
<select class="select" id="hourBranch" name="hourBranch">
<option value="">不確定 / 未知（先做概略盤）</option>
<option value="子">子時（23:00–01:00）</option>
<option value="丑">丑時（01:00–03:00）</option>
<option value="寅">寅時（03:00–05:00）</option>
<option value="卯">卯時（05:00–07:00）</option>
<option value="辰">辰時（07:00–09:00）</option>
<option value="巳">巳時（09:00–11:00）</option>
<option value="午">午時（11:00–13:00）</option>
<option value="未">未時（13:00–15:00）</option>
<option value="申">申時（15:00–17:00）</option>
<option value="酉">酉時（17:00–19:00）</option>
<option value="戌">戌時（19:00–21:00）</option>
<option value="亥">亥時（21:00–23:00）</option>
</select>
<div class="hint">不知道出生時辰也可以先做「概略盤」分析；之後補時辰，結果會更精準。</div>
<button class="btn" type="submit">開始分析</button>
<button type="button" class="btn btn-ghost" onclick="clearAll()">清除資料</button>
<div class="fineprint">按下開始分析後，資料會先儲存在本機（localStorage），再進入探索中心。</div>
</form>
<div class="footerline">© MetaMind</div>
</main>
</div>
<script>
// Auto-clear localStorage on page load for index page
localStorage.removeItem("metamind_profile");
localStorage.removeItem("baziData");
function clearAll(){
  localStorage.removeItem("metamind_profile");
  localStorage.removeItem("baziData");
  document.getElementById("baziForm").reset();
}
</script>
<script src="./assets/app.js"></script>
</body>
</html>
