<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MetaMind 智慧命理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{ --gold:#d6b15e; --bg1:#050404; --bg2:#120c07; --text:#ffffff; }
*{box-sizing:border-box}
body{ margin:0; font-family:"Noto Serif TC",serif; color:var(--text); background:linear-gradient(180deg,var(--bg1),var(--bg2)); padding:20px; }
.wrap{ max-width:480px; margin:auto; }
.title{ font-size:28px; text-align:center; margin-bottom:20px; color:var(--gold); }
.form-group{ margin-bottom:15px; }
label{ display:block; margin-bottom:5px; }
input,select{ width:100%; padding:10px; border-radius:6px; border:1px solid #333; background:#111; color:#fff; }
button{ width:100%; padding:12px; border:none; border-radius:6px; background:var(--gold); color:#000; font-weight:bold; cursor:pointer; margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
<div class="title">MetaMind</div>
<div class="form-group">
<label>您的名字</label>
<input type="text" id="userName" placeholder="請輸入名字">
</div>
<div class="form-group">
<label>西元年</label>
<input type="number" id="year" placeholder="1995">
</div>
<div class="form-group">
<label>月份</label>
<input type="number" id="month" placeholder="1" min="1" max="12">
</div>
<div class="form-group">
<label>日期</label>
<input type="number" id="day" placeholder="1" min="1" max="31">
</div>
<div class="form-group">
<label>出生時辰</label>
<select id="hour">
<option value="子">子時</option>
<option value="丑">丑時</option>
<option value="寅">寅時</option>
<option value="卯">卯時</option>
<option value="辰">辰時</option>
<option value="巳">巳時</option>
<option value="午">午時</option>
<option value="未">未時</option>
<option value="申">申時</option>
<option value="酉">酉時</option>
<option value="戌">戌時</option>
<option value="亥">亥時</option>
</select>
</div>
<button onclick="startAnalysis()">開始分析</button>
</div>
<script>
function startAnalysis(){
var name = document.getElementById("userName").value.trim();
var year = document.getElementById("year").value;
var month = document.getElementById("month").value;
var day = document.getElementById("day").value;
var hourBranch = document.getElementById("hour").value;
if(!name || !year || !month || !day || !hourBranch){ alert("請完整填寫所有資料"); return; }
var profile = { name:name, year:Number(year), month:Number(month), day:Number(day), hourBranch:hourBranch };
localStorage.setItem("metamind_profile",JSON.stringify(profile));
window.location.href="explore.html";
}
window.addEventListener("DOMContentLoaded",function(){
try{
var p = JSON.parse(localStorage.getItem("metamind_profile"));
if(p){
document.getElementById("userName").value = p.name || "";
document.getElementById("year").value = p.year || "";
document.getElementById("month").value = p.month || "";
document.getElementById("day").value = p.day || "";
document.getElementById("hour").value = p.hourBranch || "子";
}
}catch(e){}
});
</script>
</body>
</html>
